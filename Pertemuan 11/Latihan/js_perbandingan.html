<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // javascript operator perbandingan
        let a = 10;
        let b = 20;
        
        console.lo("a == b: " + (a == b)); // true jika nilai sama
        console.lo("a != b: " + (a != b)); // true jika nilai berbeda
        console.lo("a > b: " + (a > b)); // true jika a lebih besar dari b
        console.lo("a < b: " + (a < b)); // true jika a lebih kecil dari b
        console.lo("a >= b: " + (a >= b)); // true jika a lebih besar dari atau sama dengan b
        console.lo("a <= b: " + (a <= b)); // true jika a lebih kecil dari atau sama dengan b
        
    </script>
</body>
</html>
