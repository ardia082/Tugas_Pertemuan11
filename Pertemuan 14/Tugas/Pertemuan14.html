<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Mahasiswa</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin: 30px;
}

h1,h2{
    margin-bottom: 20px;
}

.form-group{
    margin-bottom: 20px;
}

label{
    display:inline-block;
    width:120px;
}

input,select{
    padding:8px;
    width:250px;
}

button{
    padding:8px 15px;
    cursor:pointer;
    margin-right:5px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

table,th,td{
    border:1px solid #000;
}

th,td{
    padding:10px;
    text-align:left;
}
</style>

</head>
<body>

<h1>Data Mahasiswa</h1>

<div class="form-group">
    <label>NIM :</label>
    <input type="text" id="nim">
</div>

<div class="form-group">
    <label>Nama :</label>
    <input type="text" id="nama">
</div>

<div class="form-group">
    <label>Jurusan :</label>
    <select id="jurusan">
        <option value="">Pilih Jurusan</option>
        <option>Teknik Informatika</option>
        <option>Sistem Informasi</option>
        <option>Teknik Elektro</option>
    </select>
</div>

<div class="form-group">
    <label>Fakultas :</label>
    <select id="fakultas">
        <option value="">Pilih Fakultas</option>
        <option>Ilmu Komputer</option>
        <option>Teknik</option>
        <option>Ekonomi</option>
    </select>
</div>

<button onclick="tambahData()">Tambah Mahasiswa</button>
<button onclick="updateData()">Update Data Mahasiswa</button>

<h2>Daftar Mahasiswa</h2>

<table>
    <thead>
        <tr>
            <th>NIM</th>
            <th>Nama</th>
            <th>Jurusan</th>
            <th>Fakultas</th>
            <th>Aksi</th>
        </tr>
    </thead>
    <tbody id="tabelMahasiswa"></tbody>
</table>

<script>

let dataMahasiswa = [
    {
        nim:"123",
        nama:"Abdul Majid",
        jurusan:"Teknik Informatika",
        fakultas:"Ilmu Komputer"
    },
    {
        nim:"124",
        nama:"Fikri",
        jurusan:"Teknik Elektro",
        fakultas:"Teknik"
    }
];

let indexEdit = -1;

function tampilData(){
    let tbody = document.getElementById("tabelMahasiswa");
    tbody.innerHTML = "";

    dataMahasiswa.forEach((mhs,index)=>{
        tbody.innerHTML += `
        <tr>
            <td>${mhs.nim}</td>
            <td>${mhs.nama}</td>
            <td>${mhs.jurusan}</td>
            <td>${mhs.fakultas}</td>
            <td>
                <button onclick="editData(${index})">Edit</button>
                <button onclick="hapusData(${index})">Delete</button>
            </td>
        </tr>
        `;
    });
}

function tambahData(){

    let nim = document.getElementById("nim").value;
    let nama = document.getElementById("nama").value;
    let jurusan = document.getElementById("jurusan").value;
    let fakultas = document.getElementById("fakultas").value;

    dataMahasiswa.push({
        nim,
        nama,
        jurusan,
        fakultas
    });

    kosongkanForm();
    tampilData();
}

function editData(index){

    indexEdit = index;

    document.getElementById("nim").value = dataMahasiswa[index].nim;
    document.getElementById("nama").value = dataMahasiswa[index].nama;
    document.getElementById("jurusan").value = dataMahasiswa[index].jurusan;
    document.getElementById("fakultas").value = dataMahasiswa[index].fakultas;
}

function updateData(){

    if(indexEdit == -1){
        alert("Pilih data yang akan diedit");
        return;
    }

    dataMahasiswa[indexEdit] = {
        nim: document.getElementById("nim").value,
        nama: document.getElementById("nama").value,
        jurusan: document.getElementById("jurusan").value,
        fakultas: document.getElementById("fakultas").value
    };

    indexEdit = -1;

    kosongkanForm();
    tampilData();
}

function hapusData(index){

    if(confirm("Yakin ingin menghapus data?")){
        dataMahasiswa.splice(index,1);
        tampilData();
    }
}

function kosongkanForm(){
    document.getElementById("nim").value = "";
    document.getElementById("nama").value = "";
    document.getElementById("jurusan").value = "";
    document.getElementById("fakultas").value = "";
}

tampilData();

</script>

</body>
</html>
